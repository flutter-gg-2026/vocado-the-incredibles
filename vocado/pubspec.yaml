name: vocado
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_dotenv: ^6.0.1
  multiple_result: ^5.2.0
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  dio: ^5.9.2
  easy_localization: ^3.0.8
  flutter_secure_storage: ^10.0.0
  sizer: ^3.1.3
  supabase_flutter: ^2.12.4
  get_storage: ^2.1.1
  get_it: ^9.2.1
  go_router: ^17.2.2
  injectable: ^3.0.0
  equatable: ^2.0.8
  package_info_plus: ^9.0.1
  device_info_plus: ^12.4.0
  loading_animation_widget: ^1.3.0
  uuid: ^4.5.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.14.0
  freezed: ^3.2.5
